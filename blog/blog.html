---
layout: default
title: FracturedSoftware News
---

{% for post in site.posts limit: 10 %}
    <div id="article-heading">
        {{ post.title }}
    </div>
    
    <div id="blog-date">
        {{ post.date | date_to_string }}
    </div>
    
    <div>
        {{ post.content }}
    </div> 
{% endfor %}
